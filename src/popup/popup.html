<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>豆包工具箱</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div>
          <h1>豆包工具箱</h1>
          <p>快速管理历史对话</p>
        </div>
        <div class="theme-switcher" role="group" aria-label="主题切换">
          <button class="theme-option" type="button" data-theme-option="system" aria-label="跟随系统" aria-pressed="false" title="跟随系统"></button>
          <button class="theme-option" type="button" data-theme-option="dark" aria-label="暗色" aria-pressed="false" title="暗色"></button>
          <button class="theme-option is-active" type="button" data-theme-option="light" aria-label="明亮" aria-pressed="true" title="明亮"></button>
        </div>
      </header>

      <section class="status-card">
        <div class="status-item">
          <span>总数</span>
          <strong id="totalSessions">0</strong>
        </div>
        <div class="status-item">
          <span>已选</span>
          <strong id="selectedSessions">0</strong>
        </div>
        <div class="status-item">
          <span>可删</span>
          <strong id="deletableSessions">0</strong>
        </div>
        <div class="status-item status-item-warning">
          <span>归档</span>
          <strong id="archivedSessions">0</strong>
        </div>
      </section>

      <section class="actions">
        <button id="toggleModeBtn" class="btn btn-primary" data-icon="multi">开启多选</button>
        <button id="selectAllBtn" class="btn btn-ghost" data-icon="check">全选</button>
        <button id="deleteSelectedBtn" class="btn btn-danger" data-icon="trash">删除已选</button>
        <button id="deleteAllBtn" class="btn btn-danger-outline" data-icon="warning">全部删除</button>
        <button id="cancelDeleteBtn" class="btn btn-ghost btn-wide" type="button" data-icon="close">取消删除</button>
        <span id="deleteAllRisk" class="risk-note">高风险：首次使用需启用</span>
      </section>

      <section class="archive-card">
        <header class="section-header">
          <strong>归档保护</strong>
          <span id="archiveStatus">未归档</span>
        </header>
        <p class="archive-copy">归档对话会在批量删除和无痕清理中自动跳过，适合保护长期保留的对话。</p>
        <div class="archive-actions">
          <button id="manageArchiveBtn" class="btn btn-ghost" type="button" data-icon="archive">管理归档</button>
          <button id="archiveSelectedBtn" class="btn btn-ghost" type="button" data-icon="archive">归档已选</button>
          <button id="unarchiveSelectedBtn" class="btn btn-ghost" type="button" data-icon="unlock">取消归档</button>
          <button id="clearArchivesBtn" class="btn btn-danger-outline" type="button" data-icon="unlock">清空保护</button>
        </div>
      </section>

      <section class="incognito-card">
        <header class="section-header">
          <strong>无痕模式</strong>
          <span id="incognitoStatus">未开启</span>
        </header>
        <label class="toggle-row">
          <input id="incognitoToggle" type="checkbox" />
          <span>自动定时清理</span>
          <span id="incognitoCountdown" class="countdown" hidden></span>
        </label>
        <label class="interval-row">
          <span>间隔</span>
          <input id="incognitoInterval" type="number" min="1" max="1440" step="1" />
          <span>分钟</span>
        </label>
      </section>

      <section class="history-card">
        <header class="section-header">
          <strong>最近任务</strong>
          <button id="openOptionsBtn" class="link-btn" type="button" data-icon="settings">设置</button>
        </header>
        <div id="latestTask" class="latest-task">暂无任务记录</div>
        <button id="retryFailedBtn" class="btn btn-ghost btn-wide" type="button" data-icon="refresh">重试失败项</button>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="../common/storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
