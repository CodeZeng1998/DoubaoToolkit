<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>豆包工具箱</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>豆包工具箱</h1>
        <p>更快管理豆包历史对话。</p>
      </header>

      <section class="status-card">
        <div class="status-item">
          <span>总数</span>
          <strong id="totalSessions">0</strong>
        </div>
        <div class="status-item">
          <span>已选</span>
          <strong id="selectedSessions">0</strong>
        </div>
        <div class="status-item">
          <span>模式</span>
          <strong id="modeLabel">关闭</strong>
        </div>
      </section>

      <section class="actions">
        <button id="toggleModeBtn" class="btn btn-primary">开启多选</button>
        <button id="selectAllBtn" class="btn btn-ghost">全选</button>
        <button id="clearSelectionBtn" class="btn btn-ghost">清空选择</button>
        <button id="deleteSelectedBtn" class="btn btn-danger">删除已选</button>
        <button id="deleteAllBtn" class="btn btn-danger-outline">全部删除</button>
        <span id="deleteAllRisk" class="risk-note">高风险：首次使用需启用</span>
      </section>

      <section class="incognito-card">
        <header class="section-header">
          <strong>无痕模式</strong>
          <span id="incognitoStatus">未开启</span>
        </header>
        <label class="toggle-row">
          <input id="incognitoToggle" type="checkbox" />
          <span>自动定时删除全部历史对话</span>
        </label>
        <label class="interval-row">
          <span>清理间隔</span>
          <input id="incognitoInterval" type="number" min="1" max="1440" step="1" />
          <span>分钟</span>
        </label>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
