<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>豆包工具箱</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>豆包工具箱</h1>
        <p>快速管理历史对话</p>
      </header>

      <section class="status-card">
        <div class="status-item">
          <span>总数</span>
          <strong id="totalSessions">0</strong>
        </div>
        <div class="status-item">
          <span>已选</span>
          <strong id="selectedSessions">0</strong>
        </div>
        <div class="status-item">
          <span>可删</span>
          <strong id="deletableSessions">0</strong>
        </div>
      </section>

      <section class="actions">
        <button id="toggleModeBtn" class="btn btn-primary">开启多选</button>
        <button id="selectAllBtn" class="btn btn-ghost">全选</button>
        <button id="deleteSelectedBtn" class="btn btn-danger">删除已选</button>
        <button id="deleteAllBtn" class="btn btn-danger-outline">全部删除</button>
        <button id="cancelDeleteBtn" class="btn btn-ghost btn-wide" type="button">取消删除</button>
        <span id="deleteAllRisk" class="risk-note">高风险：首次使用需启用</span>
      </section>

      <section class="incognito-card">
        <header class="section-header">
          <strong>无痕模式</strong>
          <span id="incognitoStatus">未开启</span>
        </header>
        <label class="toggle-row">
          <input id="incognitoToggle" type="checkbox" />
          <span>自动定时清理</span>
          <span id="incognitoCountdown" class="countdown" hidden></span>
        </label>
        <label class="interval-row">
          <span>间隔</span>
          <input id="incognitoInterval" type="number" min="1" max="1440" step="1" />
          <span>分钟</span>
        </label>
      </section>

      <section class="history-card">
        <header class="section-header">
          <strong>最近任务</strong>
          <button id="openOptionsBtn" class="link-btn" type="button">设置</button>
        </header>
        <div id="latestTask" class="latest-task">暂无任务记录</div>
        <button id="retryFailedBtn" class="btn btn-ghost btn-wide" type="button">重试失败项</button>
      </section>

      <p id="message" class="message"></p>
    </main>

    <script src="../common/storage.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
